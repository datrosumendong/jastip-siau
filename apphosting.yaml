# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # MEMBATASI ANGGARAN: Hanya 1 mesin maksimal
  maxInstances: 1
  # MEMBATASI MEMORI: Sesuai kebutuhan backend ringan
  memory: 256MiB
  # PENCEGAHAN TIMEOUT: Agar tidak menggantung terlalu lama
  timeoutSeconds: 60
