<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Sinyal Terputus - JASTIP SIAU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            color: #1768B3;
        }
        .container {
            padding: 2rem;
            max-width: 400px;
        }
        .icon-box {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 50px rgba(23, 104, 179, 0.1);
            margin-bottom: 2rem;
            border: 1px solid rgba(23, 104, 179, 0.05);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            margin: 0;
        }
        p {
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #64748B;
            margin-top: 1rem;
            line-height: 1.6;
        }
        .btn {
            margin-top: 2.5rem;
            background: #1768B3;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            box-shadow: 0 10px 30px rgba(23, 104, 179, 0.3);
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .footer {
            position: absolute;
            bottom: 2rem;
            opacity: 0.3;
            font-size: 0.6rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h.01"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/><path d="M5 12.859a10 10 0 0 1 14 0"/><path d="M1.5 9.29a15 10 0 0 1 21 0"/></svg>
        </div>
        <h1>Zona Buta Sinyal</h1>
        <p>Bumi Karangetang sedang sepi sinyal. Pastikan koneksi internet Anda aktif untuk memantau amanah.</p>
        <button class="btn" onclick="window.location.reload()">Coba Hubungkan</button>
    </div>
    <div class="footer">JASTIP SIAU V1.0</div>
</body>
</html>
